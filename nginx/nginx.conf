# Nginx Reverse Proxy für Self-Hosted AI Chatbot
# SSL-ready — Zertifikate unter /etc/nginx/ssl ablegen

upstream webui {
    server chatbot-webui:8080;
}

upstream ollama {
    server chatbot-ollama:11434;
}

# HTTP -> HTTPS Weiterleitung
server {
    listen 80;
    server_name chatbot.example.com;

    # Let's Encrypt Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name chatbot.example.com;

    # SSL-Zertifikate (via Certbot)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Sicherheits-Header
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Chat-Oberfläche
    location / {
        proxy_pass http://webui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket-Support für Streaming
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Ollama API (intern, optional)
    location /api/ollama/ {
        proxy_pass http://ollama/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Größere Dateien für Modelle
        client_max_body_size 50G;
        proxy_read_timeout 3600;
    }

    # Maximale Upload-Größe
    client_max_body_size 100M;
}
